<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <!-- Icon: two nodes connected by energy transfer arc -->
  <circle cx="28" cy="40" r="10" fill="#0F1F3D"/>
  <circle cx="28" cy="40" r="6" fill="#10b981"/>

  <!-- Transfer arc -->
  <path d="M 38 40 Q 52 22 66 40" stroke="#10b981" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 38 40 Q 52 58 66 40" stroke="#0F1F3D" stroke-width="2" fill="none" stroke-linecap="round" stroke-dasharray="4 3"/>

  <!-- Arrowhead -->
  <polygon points="63,34 70,40 63,46" fill="#10b981"/>

  <circle cx="76" cy="40" r="10" fill="#10b981"/>
  <circle cx="76" cy="40" r="6" fill="#0F1F3D"/>

  <!-- Wordmark -->
  <text x="98" y="48" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="700" fill="#0F1F3D" letter-spacing="-0.5">Aether</text>
  <text x="222" y="48" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="700" fill="#10b981" letter-spacing="-0.5">vibe</text>
</svg>
